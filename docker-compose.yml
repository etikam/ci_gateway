services:
  traefik:
    # v3.6+ : client Docker avec négociation d’API (compatible Docker Engine récent, min. API 1.40+).
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    # Configuration statique Traefik en CLI uniquement.
    # Ne pas mélanger `traefik.yml` et `command:` pour les options statiques : le résolveur ACME peut être ignoré.
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.middlewares=security-headers@file
      - --entrypoints.websecure.http.tls.options=default
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik-public
      - --providers.docker.watch=true
      - --certificatesresolvers.citls.acme.email=${ACME_EMAIL:-noreply@notes.ci.edu.gn}
      - --certificatesresolvers.citls.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.citls.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.citls.acme.httpchallenge=true
      - --certificatesresolvers.citls.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
      # Dashboard + API : uniquement sur l’hôte local du VPS (accès via tunnel SSH).
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      TZ: UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./acme.json:/letsencrypt/acme.json
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
