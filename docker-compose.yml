services:
  traefik:
    # v3.6+ : client Docker avec négociation d’API (compatible Docker Engine récent, min. API 1.40+).
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    # ACME : variables interpolées par Compose depuis `.env` (fiable sur tous les OS).
    command:
      # Défauts Compose : le résolveur existe toujours (évite « nonexistent certificate resolver » si .env est incomplet au premier up).
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-noreply@notes.ci.edu.gn}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
      # Dashboard + API : uniquement sur l’hôte local du VPS (accès via tunnel SSH).
      - "127.0.0.1:8080:8080"
    environment:
      - TZ=UTC
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./acme.json:/letsencrypt/acme.json
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
