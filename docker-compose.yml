services:
  traefik:
    # v3.6+ : client Docker avec négociation d’API (compatible Docker Engine récent, min. API 1.40+).
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "80:80"
      - "443:443"
      # Dashboard + API : uniquement sur l’hôte local du VPS (accès via tunnel SSH).
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      TZ: UTC
      # Sécurité : valeurs présentes même si `.env` omet une ligne (Traefik lit `traefik.yml` avec ${VAR}).
      ACME_EMAIL: ${ACME_EMAIL:-noreply@notes.ci.edu.gn}
      ACME_CA_SERVER: ${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./acme.json:/letsencrypt/acme.json
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
